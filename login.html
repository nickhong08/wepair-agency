<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>위페어 파트너스 - 대행사 로그인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0faf9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 52px 40px 44px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(13, 148, 136, 0.10);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-badge {
      display: inline-block;
      background: #f0faf9;
      border: 1.5px solid #99e6e0;
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 700;
      color: #0D9488;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #111;
    }
    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }
    input:focus { border-color: #0D9488; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: #0D9488;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-login:hover:not(:disabled) { background: #0f766e; }
    .btn-login:disabled { background: #a8d8d5; cursor: default; }

    .error-box {
      display: none;
      background: #FEF2F2;
      border: 1.5px solid #FCA5A5;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #B91C1C;
      margin-top: 14px;
      text-align: center;
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #bbb;
      line-height: 1.7;
    }

    @media (max-width: 420px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-badge">대행사 전용</div>
    <h1>위페어 파트너스</h1>
    <p>가입 신청 시스템에 오신 것을 환영합니다</p>
  </div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="agencyId">아이디</label>
      <input type="text" id="agencyId" autocomplete="username"
             placeholder="" required>
    </div>
    <div class="form-group">
      <label for="password">비밀번호</label>
      <input type="password" id="password" autocomplete="current-password"
             placeholder="" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">로그인</button>
    <div class="error-box" id="errorBox"></div>
  </form>

  <div class="footer">
    문의: 위페어 파트너스 고객센터<br>
    <strong>1660-4945</strong>
  </div>
</div>

<script>
  /* =====================================================================
     설정 — Apps Script URL 입력 (배포 후 교체)
     ===================================================================== */
  const API_URL = 'https://script.google.com/macros/s/AKfycbyTwANV_2jBMTq9pENtMzGRsZfFPFm-vpD4tgDWENn6WWpAUYgy5p5for7ZMOphwaYR/exec';

  /* =====================================================================
     이미 로그인된 경우 바로 신청 페이지로
     ===================================================================== */
  (async () => {
    const token = localStorage.getItem('wp_token');
    if (!token) return;
    try {
      const res = await callAPI({ action: 'verify', token });
      if (res.success) {
        location.href = 'signup.html';
      } else {
        localStorage.clear();
      }
    } catch {
      localStorage.clear();
    }
  })();

  /* =====================================================================
     로그인 처리
     ===================================================================== */
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const agencyId = document.getElementById('agencyId').value.trim();
    const password  = document.getElementById('password').value;
    const btn       = document.getElementById('loginBtn');
    const errBox    = document.getElementById('errorBox');

    if (!agencyId || !password) {
      showError('아이디와 비밀번호를 입력해주세요.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = '로그인 중...';
    errBox.style.display = 'none';

    try {
      const res = await callAPI({ action: 'login', agencyId, password });

      if (res.success) {
        localStorage.setItem('wp_token',       res.token);
        localStorage.setItem('wp_agency_id',   res.agencyId);
        localStorage.setItem('wp_license_code', res.licenseCode);
        location.href = 'signup.html';
      } else {
        showError(res.message || '로그인에 실패했습니다.');
        btn.disabled    = false;
        btn.textContent = '로그인';
      }
    } catch (err) {
      showError('서버 연결에 실패했습니다.\n잠시 후 다시 시도해주세요.');
      btn.disabled    = false;
      btn.textContent = '로그인';
    }
  });

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent     = msg;
    box.style.display   = 'block';
  }

  /* =====================================================================
     공통 API 호출 (Content-Type: text/plain → Apps Script CORS 우회)
     ===================================================================== */
  async function callAPI(payload) {
    const res = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify(payload),
    });
    return res.json();
  }
</script>

</body>
</html>
